version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install
  build:
    commands:
      - echo Building React frontend...
      - export VITE_API_BASE_URL=$VITE_API_URL
      - export VITE_AUTH_SERVER_URL=$VITE_AUTH_SERVER_URL
      - export VITE_AUTH_CLIENT_ID=$VITE_AUTH_CLIENT_ID
      - export VITE_APP_VERSION=$VITE_APP_VERSION
      - npm run build
  post_build:
    commands:
      - aws s3 rm s3://$FRONTEND_S3_BUCKET --recursive
      - aws s3 sync dist/ s3://$FRONTEND_S3_BUCKET
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID --paths "/*"